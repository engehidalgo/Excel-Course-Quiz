<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Excel — Capítulo 1: Worksheets</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark:   #0F5C34;
    --green-mid:    #1D6F42;
    --green-light:  #EAF3DE;
    --green-border: #639922;
    --green-text:   #27500A;
    --red-mid:      #A32D2D;
    --red-light:    #FCEBEB;
    --red-border:   #A32D2D;
    --red-text:     #501313;
    --blue-badge-bg:#E6F1FB;
    --blue-badge-tx:#0C447C;
    --bg-page:      #F5F5F3;
    --bg-card:      #FFFFFF;
    --bg-secondary: #F1F0EA;
    --border:       rgba(0,0,0,0.12);
    --border-md:    rgba(0,0,0,0.22);
    --text-primary: #1A1A1A;
    --text-secondary:#666660;
    --radius-md:    8px;
    --radius-lg:    12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-page:      #1A1A18;
      --bg-card:      #242422;
      --bg-secondary: #2C2C2A;
      --border:       rgba(255,255,255,0.1);
      --border-md:    rgba(255,255,255,0.2);
      --text-primary: #EFEFED;
      --text-secondary:#A0A09A;
      --green-light:  #173404;
      --green-text:   #C0DD97;
      --green-border: #3B6D11;
      --red-light:    #3D1010;
      --red-text:     #F7C1C1;
      --red-border:   #791F1F;
      --blue-badge-bg:#042C53;
      --blue-badge-tx:#B5D4F4;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem 3rem;
  }

  .container { width: 100%; max-width: 680px; }

  .xl-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .xl-logo {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--green-mid); display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .xl-logo svg { width: 26px; height: 26px; }
  .xl-title { font-size: 18px; font-weight: 500; color: var(--text-primary); }
  .xl-sub   { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

  .cell-bar {
    display: flex; gap: 4px; align-items: center;
    margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .cell {
    width: 30px; height: 26px; border: 0.5px solid var(--border);
    border-radius: 4px; display: flex; align-items: center;
    justify-content: center; font-size: 10px; font-weight: 500;
    color: var(--text-secondary); background: var(--bg-secondary);
    transition: all 0.2s;
  }
  .cell.done   { background: var(--green-mid); border-color: var(--green-mid); color: #fff; }
  .cell.wrong  { background: var(--red-mid);   border-color: var(--red-mid);   color: #fff; }
  .cell.active { border: 1.5px solid var(--green-mid); color: var(--green-mid); background: var(--bg-card); }
  .cell-eq { font-size: 12px; color: var(--text-secondary); margin-left: 6px; white-space: nowrap; }

  .q-card {
    background: var(--bg-card); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem;
  }
  .q-badge {
    display: inline-block; font-size: 11px; padding: 3px 10px;
    border-radius: 99px; background: var(--blue-badge-bg);
    color: var(--blue-badge-tx); font-weight: 500; margin-bottom: 0.75rem;
  }
  .q-text { font-size: 15px; color: var(--text-primary); line-height: 1.65; margin-bottom: 1rem; }

  code {
    font-family: "Courier New", monospace;
    background: var(--bg-secondary);
    padding: 2px 6px; border-radius: 4px; font-size: 13px;
  }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-md); background: var(--bg-secondary);
    color: var(--text-primary); font-size: 14px; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    text-align: left; width: 100%; line-height: 1.5; font-family: inherit;
  }
  .opt:hover:not(:disabled) { background: var(--bg-card); border-color: var(--border-md); }
  .opt:disabled { cursor: default; }
  .opt-icon {
    width: 24px; height: 24px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 11px; font-weight: 600;
    background: var(--bg-card); border: 0.5px solid var(--border);
    color: var(--text-secondary); transition: all 0.15s;
  }
  .opt.correct             { background: var(--green-light); border-color: var(--green-border); color: var(--green-text); }
  .opt.correct .opt-icon   { background: var(--green-mid);   border-color: var(--green-mid);   color: #fff; }
  .opt.incorrect           { background: var(--red-light);   border-color: var(--red-border);  color: var(--red-text); }
  .opt.incorrect .opt-icon { background: var(--red-mid);     border-color: var(--red-mid);     color: #fff; }
  .opt.reveal              { background: var(--green-light); border-color: #97C459; color: var(--green-text); opacity: 0.75; }
  .opt.reveal .opt-icon    { background: #97C459; border-color: #97C459; color: #fff; }

  .feedback {
    margin-top: 12px; padding: 10px 14px; border-radius: var(--radius-md);
    font-size: 13px; line-height: 1.6; display: none;
  }
  .feedback.correct  { background: var(--green-light); color: var(--green-text); display: flex; gap: 8px; align-items: flex-start; }
  .feedback.incorrect{ background: var(--red-light);   color: var(--red-text);   display: flex; gap: 8px; align-items: flex-start; }
  .fb-icon { flex-shrink: 0; font-weight: 600; }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; gap: 8px; }
  .nav-btn {
    padding: 8px 20px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-md); background: var(--bg-secondary);
    color: var(--text-primary); font-size: 14px; cursor: pointer; font-family: inherit;
  }
  .nav-btn:hover:not(:disabled) { background: var(--bg-card); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn.primary { background: var(--green-mid); border-color: var(--green-mid); color: #fff; }
  .nav-btn.primary:hover:not(:disabled) { background: var(--green-dark); }
  .counter { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }

  .score-wrap { text-align: center; padding: 1.5rem 1rem; }
  .score-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 1.25rem 0; }
  .score-metric { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 0.85rem 0.5rem; }
  .score-metric .val { font-size: 26px; font-weight: 500; color: var(--text-primary); }
  .score-metric .lbl { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .score-title { font-size: 18px; font-weight: 500; color: var(--text-primary); margin-bottom: 0.5rem; }
  .score-msg   { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1.25rem; }
  .score-icon  { font-size: 36px; margin-bottom: 0.5rem; }
  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  footer { text-align: center; margin-top: 2rem; font-size: 12px; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="container">

  <div class="xl-header">
    <div class="xl-logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="3" width="20" height="18" rx="2" fill="white" fill-opacity="0.15"/>
        <path d="M8 3v18M2 9h20M2 15h20" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="xl-title">Capítulo 1 — Worksheets</div>
      <div class="xl-sub">Hojas de cálculo · 13 preguntas</div>
    </div>
  </div>

  <div class="cell-bar" id="cellbar"></div>
  <div id="quiz"></div>

  <footer>Curso de Luke Barousse · Cuestionario generado con Claude</footer>
</div>

<script>
const Qs = [
  {
    q: "¿Cuál es la diferencia entre un Worksheet y un Workbook?",
    opts: ["Son lo mismo, solo cambia el nombre según la versión de Excel", "Un Worksheet es una hoja individual; un Workbook es el archivo completo que puede contener varias hojas", "Un Workbook es una hoja individual; un Worksheet es el archivo completo", "Un Worksheet es el archivo y un Workbook es la celda seleccionada"],
    ok: 1,
    exp: "El Worksheet (hoja) es la pestaña individual como 'Sheet1'. El Workbook (libro) es el archivo .xlsx completo que puede contener una o varias hojas."
  },
  {
    q: "¿Cómo se llama la referencia correcta para una celda ubicada en la columna B, fila 2?",
    opts: ["2B", "B-2", "B2", "fila2colB"],
    ok: 2,
    exp: "En Excel siempre va primero la letra de la columna y luego el número de fila. Por eso la celda en columna B, fila 2 se llama B2."
  },
  {
    q: "Si escribes TRUE en una celda y presionas Enter, ¿qué hace Excel?",
    opts: ["Lo convierte a texto normal", "Lo muestra en minúsculas: true", "Lo reconoce como valor Booleano y lo escribe en mayúsculas automáticamente", "Muestra un error porque TRUE no es un valor válido"],
    ok: 2,
    exp: "Excel reconoce TRUE y FALSE como valores Booleanos. Los escribe automáticamente en mayúsculas y los trata como un tipo de dato especial, diferente al texto."
  },
  {
    q: "¿Qué hace el Autofill cuando seleccionas las celdas con los valores 1 y 2, y arrastras hacia abajo?",
    opts: ["Copia el número 2 en todas las celdas", "Repite la secuencia 1,2,1,2 indefinidamente", "Continúa la secuencia: 3, 4, 5...", "Muestra un error porque no puede predecir la secuencia"],
    ok: 2,
    exp: "Cuando seleccionas dos números consecutivos y arrastras, Excel detecta el patrón y continúa la secuencia automáticamente. Con 1 y 2, generará 3, 4, 5 y así sucesivamente."
  },
  {
    q: "¿Cuál es la forma correcta de concatenar el contenido de A2 y F2 con un guion en medio?",
    opts: ["=A2+' - '+F2", "=A2&F2&-", "=A2&' - '&F2", "=CONCAT(A2,-,F2)"],
    ok: 2,
    exp: "El operador & une celdas y texto. El texto literal debe ir entre comillas. La fórmula correcta es =A2&' - '&F2, que produce algo como: Excel - Beginner."
  },
  {
    q: "¿Qué atajo de teclado usas para copiar y pegar una celda en Excel?",
    opts: ["Ctrl+C para copiar, Ctrl+P para pegar", "Ctrl+C para copiar, Ctrl+V para pegar", "Ctrl+X para copiar, Ctrl+V para pegar", "Ctrl+C para copiar, Ctrl+B para pegar"],
    ok: 1,
    exp: "Ctrl+C copia y Ctrl+V pega. Ctrl+X es cortar (elimina el original). Ctrl+P es imprimir, no pegar."
  },
  {
    q: "¿Cómo almacena Excel las fechas internamente?",
    opts: ["Como texto en formato DD/MM/AAAA", "Como números, donde el 1 equivale al 1 de enero de 1900", "Como código binario que solo Excel puede leer", "Como texto en formato ISO: AAAA-MM-DD"],
    ok: 1,
    exp: "Excel guarda las fechas como números. El número 1 es el 1 de enero de 1900. Por eso al cambiar el formato de una fecha a 'General' verás un número."
  },
  {
    q: "¿Qué es un rango dinámico en Excel?",
    opts: ["Una fórmula que suma automáticamente todas las celdas de una columna", "Una selección de celdas que se actualiza sola cuando cambian los datos originales, usando una sola fórmula", "Un gráfico que cambia de color según los valores de las celdas", "Una tabla que se expande automáticamente al agregar nuevas filas"],
    ok: 1,
    exp: "Al escribir =A1:G6 en una sola celda, Excel llena automáticamente todas las celdas adyacentes. Si cambias algo en el rango original, la copia se actualiza sola en tiempo real."
  },
  {
    q: "Escribes =A1:G6 en la celda I1. ¿Qué señal visual muestra Excel para indicar que es un rango dinámico?",
    opts: ["Las celdas del rango se pintan de amarillo", "Aparece un borde sombreado alrededor del bloque de celdas llenadas automáticamente", "Excel muestra un mensaje emergente de confirmación", "La fórmula aparece en rojo en la barra de fórmulas"],
    ok: 1,
    exp: "El borde sombreado es la señal visual de Excel que indica que ese bloque está controlado por una única fórmula dinámica, no por fórmulas individuales en cada celda."
  },
  {
    q: "¿En qué pestaña del Ribbon y en qué grupo encuentras el desplegable para cambiar el formato de una celda (General, Number, Date, etc.)?",
    opts: ["Pestaña Insert, grupo Format", "Pestaña Home, grupo Number", "Pestaña Formulas, grupo Format Cells", "Pestaña Data, grupo Number"],
    ok: 1,
    exp: "El desplegable de formatos está en la pestaña Home, dentro del grupo Number. Por defecto muestra 'General' y desde ahí puedes cambiar a Number, Date, Currency, Text y más."
  },
  {
    q: "¿Cuál es la sintaxis correcta para calcular el promedio de las celdas B2 hasta B6?",
    opts: ["=PROM(B2:B6)", "=AVERAGE(B2;B6)", "=AVERAGE(B2:B6)", "=AVG(B2:B6)"],
    ok: 2,
    exp: "La función correcta es AVERAGE (en inglés). El rango se escribe con dos puntos entre la primera y última celda: =AVERAGE(B2:B6). PROM es la versión en español y AVG no existe en Excel."
  },
  {
    q: "¿Cuál es la forma más simple de evitar que aparezcan ceros al referenciar una columna entera como rango dinámico?",
    opts: ["Usar =A:A y luego ocultar manualmente las filas con cero", "Usar un rango específico como =A1:A1000 en lugar de =A:A", "Aplicar formato de texto a todas las celdas vacías", "No hay forma de evitarlo, es un comportamiento fijo de Excel"],
    ok: 1,
    exp: "En lugar de referenciar =A:A (columna entera), usa =A1:A1000 o el número de filas que necesites. Las celdas vacías dentro del rango aparecerán vacías, no como cero."
  },
  {
    q: "¿Qué hace la fórmula =IF(A1=\"\",\"\",A1) en una celda?",
    opts: ["Suma todos los valores de la columna A", "Si A1 está vacía muestra cero; si tiene valor lo duplica", "Si A1 está vacía no muestra nada; si tiene valor lo muestra", "Convierte el contenido de A1 a texto"],
    ok: 2,
    exp: "Esta fórmula IF evalúa si A1 está vacía. Si lo está, muestra vacío. Si tiene un valor, lo muestra tal cual. Es útil para evitar ceros indeseados al copiar rangos con celdas vacías."
  }
];

const letters = ["A","B","C","D"];
let cur = 0, score = 0, answers = [];

function sound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if (type === "ok") {
      o.frequency.setValueAtTime(523, ctx.currentTime);
      o.frequency.setValueAtTime(659, ctx.currentTime + 0.12);
      o.frequency.setValueAtTime(784, ctx.currentTime + 0.24);
      g.gain.setValueAtTime(0.25, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
      o.start(); o.stop(ctx.currentTime + 0.55);
    } else {
      o.frequency.setValueAtTime(280, ctx.currentTime);
      o.frequency.setValueAtTime(180, ctx.currentTime + 0.18);
      g.gain.setValueAtTime(0.25, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
      o.start(); o.stop(ctx.currentTime + 0.45);
    }
  } catch(e) {}
}

function renderCells() {
  const bar = document.getElementById("cellbar");
  bar.innerHTML = Qs.map((_, i) => {
    let cls = "cell";
    if (answers[i] !== undefined) cls += answers[i] === Qs[i].ok ? " done" : " wrong";
    else if (i === cur) cls += " active";
    return `<div class="${cls}">${i + 1}</div>`;
  }).join("") + `<span class="cell-eq">= ${score}/${Qs.length} correctas</span>`;
}

function pick(idx) {
  if (answers[cur] !== undefined) return;
  answers[cur] = idx;
  if (idx === Qs[cur].ok) { score++; sound("ok"); } else { sound("no"); }
  render();
}

function render() {
  if (cur >= Qs.length) { renderScore(); return; }
  renderCells();
  const q = Qs[cur];
  const done = answers[cur] !== undefined;
  const chosen = answers[cur];

  const optsHTML = q.opts.map((o, i) => {
    let cls = "opt";
    if (done) {
      if (i === q.ok) cls += " correct";
      else if (i === chosen) cls += " incorrect";
    }
    const icon = done ? (i === q.ok ? "✓" : i === chosen ? "✗" : letters[i]) : letters[i];
    return `<button class="${cls}" onclick="pick(${i})" ${done ? "disabled" : ""}>
      <span class="opt-icon">${icon}</span>${o}
    </button>`;
  }).join("");

  let fbHTML = "";
  if (done) {
    const ok = chosen === q.ok;
    fbHTML = `<div class="feedback ${ok ? "correct" : "incorrect"}">
      <span class="fb-icon">${ok ? "✓" : "✗"}</span>
      <span>${q.exp}</span>
    </div>`;
  }

  const isLast = cur === Qs.length - 1;
  const nextBtn = done && !isLast
    ? `<button class="nav-btn primary" onclick="go(1)">Siguiente →</button>`
    : done && isLast
    ? `<button class="nav-btn primary" onclick="renderScore()">Ver resultado</button>`
    : `<button class="nav-btn primary" disabled>Siguiente →</button>`;

  document.getElementById("quiz").innerHTML = `
    <div class="q-card">
      <div class="q-badge">Pregunta ${cur + 1} de ${Qs.length}</div>
      <p class="q-text">${q.q}</p>
      <div class="options">${optsHTML}</div>
      ${fbHTML}
    </div>
    <div class="nav">
      <button class="nav-btn" onclick="go(-1)" ${cur === 0 ? "disabled" : ""}>← Anterior</button>
      <span class="counter">${score} correcta${score !== 1 ? "s" : ""} hasta ahora</span>
      ${nextBtn}
    </div>`;
}

function go(dir) { cur += dir; render(); }

function renderScore() {
  renderCells();
  const pct = Math.round(score / Qs.length * 100);
  let msg = "", icon = "", title = "";
  if (pct === 100) { icon = "🏆"; title = "¡Perfecto!"; msg = "13 de 13. Dominaste completamente la lección de Worksheets. Listo para Workbooks."; }
  else if (pct >= 70) { icon = "✓"; title = "¡Buen resultado!"; msg = "Sólido. Repasa las celdas en rojo antes de continuar con la lección 2."; }
  else { icon = "↩"; title = "Sigue practicando"; msg = "Vuelve al resumen de Worksheets y vuelve a intentarlo. Sin apuro."; }

  document.getElementById("quiz").innerHTML = `
    <div class="q-card score-wrap">
      <div class="score-icon">${icon}</div>
      <div class="score-title">${title}</div>
      <div class="score-grid">
        <div class="score-metric"><div class="val">${score}/${Qs.length}</div><div class="lbl">correctas</div></div>
        <div class="score-metric"><div class="val">${pct}%</div><div class="lbl">precisión</div></div>
        <div class="score-metric"><div class="val">${Qs.length - score}</div><div class="lbl">para repasar</div></div>
      </div>
      <p class="score-msg">${msg}</p>
      <div class="btn-row">
        <button class="nav-btn" onclick="restart()">↩ Reintentar</button>
      </div>
    </div>`;
}

function restart() { cur = 0; score = 0; answers = []; render(); }
render();
</script>
</body>
</html>
